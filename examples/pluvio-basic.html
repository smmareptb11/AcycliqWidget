<!DOCTYPE html>
<html lang="fr">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Acycliq Widget — Exemple Pluvio</title>
</head>
<body>
	<div id="pluvio1" style="width: 100%; height: 500px;"></div>

	<script src="https://unpkg.com/acycliq-widget@latest/dist/embed/acycliq-widget.min.js"></script>
	<script>
		acycliq.pluvio({
			apiUrl: 'https://smmar.acycliq.fr/api',
			token: 'VOTRE_TOKEN_ICI',
			container: '#pluvio1',
			idStation: 719,
			hours: 3,
			cumul: true
		})
	</script>
</body>
</html>
